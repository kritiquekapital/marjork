<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>.oCam</title>

  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="96x96" href="/assets/icons/favicon-96x96.png">
  <link rel="icon" href="/assets/icons/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="/assets/icons/site.webmanifest">
  <link rel="mask-icon" href="/assets/icons/safari-pinned-tab.svg" color="#5bbad5">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script
    defer
    src="https://cloud.umami.is/script.js"
    data-website-id="0744fc35-c1fb-4515-9fa3-0c503c77a110"
    data-domains="kritiquekapital.com,www.kritiquekapital.com"
    data-exclude-search="true"
    data-exclude-hash="true"
    data-do-not-track="true"
    data-performance="true"
  ></script>

  <meta name="msapplication-TileColor" content="#0c0d11">
  <meta name="theme-color" content="#0c0d11">

  <link rel="stylesheet" href="css/radial.css">
  <link rel="stylesheet" href="css/sections/resume-section.css">
  <link rel="stylesheet" href="css/sections/writing-section.css">
  <link rel="stylesheet" href="css/sections/marketing-section.css">
  <link rel="stylesheet" href="css/sections/creative-section.css">
  <link rel="stylesheet" href="css/sections/film-section.css">
  <link rel="stylesheet" href="css/sections/music-section.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
  <main class="site-shell">
    <section class="space-view" id="spaceView" aria-label="Portfolio navigation space">
      <div class="space-camera" id="spaceCamera">
        <section class="section-panel" data-slot="1" data-section="marketing" aria-labelledby="panel-title-marketing"></section>
        <section class="section-panel" data-slot="2" data-section="creative" aria-labelledby="panel-title-creative"></section>
        <section class="section-panel" data-slot="3" data-section="music" aria-labelledby="panel-title-music"></section>
        <section class="section-panel" data-slot="4" data-section="resume" aria-labelledby="panel-title-resume"></section>
        <section class="section-panel" data-slot="5" data-section="film" aria-labelledby="panel-title-film"></section>
        <section class="section-panel" data-slot="6" data-section="writing" aria-labelledby="panel-title-writing"></section>
        <div id="radial" class="radial" aria-label="Portfolio wheel">
          <svg
            class="radial-svg"
            viewBox="0 0 100 100"
            aria-hidden="true"
            focusable="false"
          >
            <circle class="radial-ring-base" cx="50" cy="50" r="49"></circle>
            <circle class="radial-ring-cutout" cx="50" cy="50" r="25.5"></circle>

            <g class="slice-group slice-marketing" data-slot="1" data-section="marketing" tabindex="0" role="button" aria-label="Open marketing section">
              <path class="slice-path" d="M 50.000 24.500 L 50.000 0.000 A 50.000 50.000 0 0 1 93.301 25.000 L 71.218 37.750 A 24.500 24.500 0 0 0 50.000 24.500 Z"></path>
            </g>

            <g class="slice-group slice-creative" data-slot="2" data-section="creative" tabindex="0" role="button" aria-label="Open creative section">
              <path class="slice-path" d="M 71.218 37.750 L 93.301 25.000 A 50.000 50.000 0 0 1 93.301 75.000 L 71.218 62.250 A 24.500 24.500 0 0 0 71.218 37.750 Z"></path>
            </g>

            <g class="slice-group slice-resume" data-slot="3" data-section="music" tabindex="0" role="button" aria-label="Open music section">
              <path class="slice-path" d="M 71.218 62.250 L 93.301 75.000 A 50.000 50.000 0 0 1 50.000 100.000 L 50.000 75.500 A 24.500 24.500 0 0 0 71.218 62.250 Z"></path>
            </g>

            <g class="slice-group slice-writing" data-slot="4" data-section="resume" tabindex="0" role="button" aria-label="Open resume section">
              <path class="slice-path" d="M 50.000 75.500 L 50.000 100.000 A 50.000 50.000 0 0 1 6.699 75.000 L 28.782 62.250 A 24.500 24.500 0 0 0 50.000 75.500 Z"></path>
            </g>

            <g class="slice-group slice-film" data-slot="5" data-section="film" tabindex="0" role="button" aria-label="Open film section">
              <path class="slice-path" d="M 28.782 62.250 L 6.699 75.000 A 50.000 50.000 0 0 1 6.699 25.000 L 28.782 37.750 A 24.500 24.500 0 0 0 28.782 62.250 Z"></path>
            </g>

            <g class="slice-group slice-about" data-slot="6" data-section="writing" tabindex="0" role="button" aria-label="Open writing section">
              <path class="slice-path" d="M 28.782 37.750 L 6.699 25.000 A 50.000 50.000 0 0 1 50.000 0.000 L 50.000 24.500 A 24.500 24.500 0 0 0 28.782 37.750 Z"></path>
            </g>
          </svg>

          <div class="slice-labels" aria-hidden="true">
            <span class="slice-label" data-slot="1" data-section="marketing">marketing</span>
            <span class="slice-label" data-slot="2" data-section="creative">creative</span>
            <span class="slice-label" data-slot="3" data-section="music">music</span>
            <span class="slice-label" data-slot="4" data-section="resume">resume</span>
            <span class="slice-label" data-slot="5" data-section="film">film</span>
            <span class="slice-label" data-slot="6" data-section="writing">writing</span>
          </div>

          <button class="center" id="centerHub" aria-label="Return to home view">
            <span class="center-core">.oCam</span>

            <span class="center-greetings" aria-hidden="true">
              <span class="center-greeting" style="--greeting-delay: 0s;">hello!</span>
              <span class="center-greeting" style="--greeting-delay: 3.5s;">привет!</span>
              <span class="center-greeting" style="--greeting-delay: 7s;">olá!</span>
              <span class="center-greeting" style="--greeting-delay: 10.5s;">hola!</span>
            </span>
          </button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="site-footer-left">
      <span class="site-footer-warning">WIP / Not Mobile Optimized</span>
    </div>

    <div class="site-footer-center">
      <button id="homeButton" class="home-button" aria-label="Return to center">
        home
      </button>
    </div>

    <div class="site-footer-right">
      <span class="site-footer-brand">© .oCam Studios</span>
    </div>
  </footer>

  <script type="module" src="js/mobile.js"></script>
  <script type="module" src="js/radial.js"></script>
  <script type="module" src="js/sections/resume-section.js"></script>
  <script type="module" src="js/sections/film-section.js"></script>
  <script type="module" src="js/sections/music-section.js"></script>
  <script type="module" src="js/sections/writing-section.js"></script>
  <script type="module" src="js/sections/marketing-section.js"></script>
  <script type="module" src="js/sections/creative-section.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9, maximum-scale=1, user-scalable=no">
  <title>.oCam</title>

  <!-- Fonts & Core CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/web.css">
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/popups.css">
  <link rel="stylesheet" href="css/mobile.css"> <!-- ALWAYS load, media queries handled internally -->
  <link rel="stylesheet" href="css/logistics.css">

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/favicon.ico"> 
  <link rel="icon" type="image/png" sizes="32x32" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/apple-touch-icon.png">
  <link rel="mask-icon" href="https://raw.githubusercontent.com/kritiquekapital/marjork/main/suprises/icon/safari-pinned-tab.svg" color="#5bbad5">
  <meta name="msapplication-TileColor" content="#da532c">
  <meta name="theme-color" content="#ffffff">
</head>

<body>
  <div class="container">
    <div class="grid-container">
      <div id="space-background"></div>
      <div class="grid-backdrop"></div>

      <!-- First Row -->
      <a href="https://substack.com/@camglhf?utm_source=user-menu" target="_blank" class="substack-button">
        <img src="https://raw.githubusercontent.com/kritiquekapital/marjork/main/css/pic/Psych-Flower%20%2304.png" alt="Substack">
      </a>
      <a href="https://x.com/cameron_glhf" target="_blank" class="twitter">
        <img src="https://pbs.twimg.com/profile_images/1778281333531234305/6Vj_j3iH_400x400.jpg" alt="Twitter">
      </a>
      <a href="https://www.duolingo.com/profile/marjork?via=share_profile_qr" target="_blank" class="duolingo">
        <img src="https://simg-ssl.duolingo.com/ssr-avatars/825995047/SSR-KngIoLV5cH/xlarge" alt="Duolingo">
      </a>

      <!-- Second Row -->
      <a href="https://stats.fm/marjork" target="_blank" class="statsfm">
        <img src="https://stats.fm/api/image?url=https%3A%2F%2Fcdn.stats.fm%2Ffile%2Fstatsfm%2Fimages%2Fusers%2F31m6yxbmqxjd6zq3eg6kk3aefuae%2Fdc140bda1efee5a6acf1d7e33a38d46c.webp&w=256&q=75&fallbackImg=https://cdn.stats.fm/file/statsfm/images/placeholders/users/private.webp" alt="StatsFM">
        <div class="overlay">
          <img src="https://em-content.zobj.net/source/apple/391/goose_1fabf.png" alt="goose">
        </div>
      </a>
      <a href="https://letterboxd.com/marjork/" target="_blank" class="letterboxd"></a>
      <a href="https://dropkickd.com/profile/majork" target="_blank" class="dropkickd-button">
        <span class="logo"></span>
      </a>

      <!-- Third Row -->
      <a href="https://open.spotify.com/user/31m6yxbmqxjd6zq3eg6kk3aefuae" target="_blank" class="spotify">
        <div class="bar top"></div>
        <div class="bar middle"></div>
        <div class="bar bottom"></div>
      </a>
      <a href="#" class="photo">
        <div class="lens"></div>
      </a>
      <a href="#" class="news-button"></a>

      <!-- Fourth Row -->
      <a href="#" class="propaganda-link" target="_blank">
        <div class="propaganda">
          <span class="symbol">LIVE</span>
        </div>
      </a>
      <div class="kiss-hole" aria-hidden="true"></div>
        <button class="kiss-button"></button>
      <div class="vinyl">
        <a href="javascript:void(0);" class="vinyl-link">
          <div class="wood-box"></div>
          <div class="record"></div>
          <div class="arm">
            <div class="stylus-base"></div>
          </div>
        </a>
      </div>

      <!-- Fifth Row -->
      <button class="theme-button" id="themeButton">🌓</button>
      <button class="cool-games-i-like-button" id="games-like-button">🎮</button>
      <button class="secret-button">🔜</button>
    </div>
  </div>

  <!-- Floating Components -->
  <div id="musicPlayer" class="ipod-popup draggable">
    <div class="ipod-screen">
      <iframe id="musicFrame" width="100%" height="100%" frameborder="0" allow="autoplay"></iframe>
    </div>
    <div class="ipod-controls">
      <button class="ipod-btn menu-btn">MENU</button>
      <div class="click-wheel">
        <button class="ipod-btn prev-btn">◀◀</button>
        <button class="ipod-btn next-btn">▶▶</button>
        <button class="ipod-btn playpause">▶/❚❚</button>
      </div>
    </div>
  </div>

  <div id="videoPlayer" class="draggable" style="display: none;">
    <div class="video-resize-bar"></div>
    <iframe id="videoFrame" allow="autoplay; fullscreen"></iframe>
    <div class="video-controls">
      <button id="videoPrev">◀ Prev</button>
      <button id="videoPin" class="pin-btn">📌</button>
      <button id="videoNext">Next ▶</button>
    </div>
  </div>

  <div id="gamesShelfOverlay" class="games-shelf-overlay" aria-hidden="true">
   <div class="games-shelf-modal" role="dialog" aria-modal="true" aria-labelledby="gamesShelfTitle">
     <div class="games-shelf-header">
        <h2 id="gamesShelfTitle">Games I Like</h2>
        <button id="closeGamesShelf" class="close-button games-shelf-close" aria-label="Close games shelf">×</button>
     </div>

     <div class="games-shelf-frame">
       <div id="gamesShelfRow" class="games-shelf-row"></div>
      </div>
   </div>
  </div>

  <div class="popup-game" id="minesweeper-game" style="display: none;">
    <div class="minesweeper-header">
      <div class="minesweeper-controls">
        <select class="difficulty-select" id="difficulty-select">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>
        <button class="new-game-button">New Game</button>
        <button class="fullscreen-button mobile-only">⛶</button>
      </div>
      <button class="close-button" id="close-minesweeper">×</button>
    </div>
    <div id="minesweeper-grid"></div>
  </div>

  <!-- Scripts -->
  <script type="module" src="js/bounceable.js" defer></script>
  <script src="https://www.youtube.com/iframe_api"></script>
  <script type="module" src="js/themeSwitcher_0.9.js" defer></script> 
  <script src="js/photoButton_0.9.js" defer></script>
  <script type="module" src="js/chaseable.js" defer></script>
  <script type="module" src="js/kissButton_0.9.js" defer></script>
  <script type="module" src="js/musicPlayer_1.0.js" defer></script>
  <script type="module" src="js/cinema.js" defer></script>
  <script src="js/vinylButton_0.9.js" defer></script>
  <script src="js/coolgamesilike.js" defer></script>
  <script type="module" src="js/minesweeper.js" defer></script>
  <script src="js/touch-events.js" defer></script>
  <script src="js/handleLinks.js"></script>
  <script src="js/spinna.js"></script>
  <script type="module" src="js/settingsPanel.js" defer></script>
  <script type="module" src="js/library.js" defer></script>

  <!-- Bookcase / Library Shelf -->
  <div id="bookcaseWrapper" class="bookcase-wrapper" style="display:none;">
    <div id="bookcaseBackdrop" class="bookcase-backdrop"></div>
    <div id="bookcase" class="popup-bookcase">
      <div class="bookcase-header">
        <h2>Library</h2>
        <button id="closeBookcase" class="close-button">×</button>
      </div>
      <div id="bookGrid" class="book-grid"></div> <!-- JS injects books here -->
    </div>
  </div>

  <!-- PDF Reader -->
  <div id="pdfReader" class="popup-pdfreader" style="display:none;">
    <div class="pdf-header">
      <div class="pdf-title">
        <span id="pdfSection"></span> – <span id="pdfWorkTitle"></span>
      </div>
      <button id="closeReader" class="close-button">×</button>
    </div>
    <iframe id="pdfFrame" class="pdf-frame" src="" frameborder="0"></iframe>
  </div>

<div id="siteSettings" class="site-settings" aria-label="Site settings">
  <button id="settingsCog" class="settings-cog" aria-label="Open site settings" aria-expanded="false">
    <span class="settings-cog-icon">⚙</span>
  </button>

  <div id="settingsDropdown" class="settings-dropdown" aria-hidden="true">
    <button
      type="button"
      id="siteVolumeOrb"
      class="settings-volume-orb"
      aria-label="Site volume"
      aria-valuemin="0"
      aria-valuemax="100"
      aria-valuenow="40"
      style="--volume-fill: 40%;"
    >
      <span class="settings-volume-label">🔊</span>
    </button>
  </div>
</div>

</body>
</html>
